    <style>
      /*

        --theme-overlay: rgba(0,0,0,0.5);
      }
      body {
        background-color: var(--theme-bg);
        color: var(--theme-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

      /* Prevent layout shifts */
      * {

      /* Stabilize scrollbar to prevent jumping */

      .safe-area-inset-top { padding-top: env(safe-area-inset-top, 0px); }

      .theme-bg { background-color: var(--theme-bg); }

      input.theme-input,

      textarea.theme-input:-webkit-autofill:hover,
      textarea.theme-input:-webkit-autofill:focus,
      textarea.theme-input:-webkit-autofill:active,
      input[class*="theme-input"]:-webkit-autofill,
      input[class*="theme-input"]:-webkit-autofill:hover,
      input[class*="theme-input"]:-webkit-autofill:focus,
      input[class*="theme-input"]:-webkit-autofill:active,
      textarea[class*="theme-input"]:-webkit-autofill,

      .theme-active:active { background-color: var(--theme-active); }
      .theme-bg-backdrop { background-color: color-mix(in srgb, var(--theme-bg) 80%, transparent); }

        background: rgba(255,255,255,0.85);

      }
      .theme-accent-tint { background-color: color-mix(in srgb, var(--theme-accent) 20%, var(--theme-input)); }
      .theme-success { color: var(--theme-success); }
      .theme-error { color: var(--theme-error); }
      .theme-warning { color: var(--theme-warning); }
      .theme-like { color: var(--theme-like); }

      .hover\:theme-accent:hover { color: var(--theme-accent); }

      /* Slide Animations for Step Transitions */
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      .animate-slide-in-right {
        animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      
      .animate-slide-in-left {
        animation: slideInLeft 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }

        animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;

      @keyframes fadeIn {
        from { opacity: 0; }

      @keyframes confirmSlideUp {
        from { opacity: 0; transform: translateY(100%); }
        to { opacity: 1; transform: translateY(0); }

      /* Fade-in animation for posts and content */
      .animate-fade-in {

      /* Fade-in-up animation (already defined in Tailwind config, but adding class) */

      @keyframes pollOptionIn {

      /* Subtle scale on tap */
      @keyframes pollTap {
